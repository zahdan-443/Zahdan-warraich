name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK & Accept Licenses
        uses: android-actions/setup-android@v3

      - name: Automatically Accept All SDK Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci || npm install

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate Native App Icons & Splash Screen
        run: |
          cp public/logo.png public/icon.png 2>/dev/null || true
          npx -y @capacitor/assets@latest generate --android --assetPath public || true

      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as Downloadable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Al-Hadi-Goods-APK
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30

