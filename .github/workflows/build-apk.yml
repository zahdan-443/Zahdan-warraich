name: Build Al-Hadi Goods APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: rm -rf node_modules package-lock.json && npm install

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@5.7.0

      - name: Remove old android folder if exists
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor (full sync, not just copy)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlHadi-Goods-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
